<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Inventory — AI-Native for Testers</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232636;
      --border: #2e3147;
      --accent: #7c6af7;
      --accent2: #56cfb2;
      --accent3: #f7816a;
      --text: #e8eaf0;
      --muted: #8b8fa8;
      --tag-bg: #252840;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo p {
      font-size: 12px;
      color: var(--muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 14px;
      width: 240px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }

    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.88; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .btn-danger {
      background: transparent;
      color: var(--accent3);
      border: 1px solid transparent;
      padding: 6px 10px;
      font-size: 13px;
    }

    .btn-danger:hover { background: rgba(247,129,106,0.1); }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 22px;
      flex: 1;
      min-width: 140px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
    }

    .filter-chip:hover { background: var(--surface2); color: var(--text); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .card-title-block { flex: 1; min-width: 0; }

    .card-name {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-category {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .card-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover .card-actions { opacity: 1; }

    .card-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-size: 13px;
    }

    .meta-key {
      color: var(--muted);
      min-width: 76px;
      flex-shrink: 0;
    }

    .meta-val { color: var(--text); }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .tag {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--accent2);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .status-active { background: rgba(86,207,178,0.12); color: var(--accent2); }
    .status-experimental { background: rgba(124,106,247,0.12); color: var(--accent); }
    .status-deprecated { background: rgba(247,129,106,0.12); color: var(--accent3); }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }

    .modal h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--accent);
    }

    .field textarea { resize: vertical; min-height: 80px; }

    .field select option { background: var(--surface2); }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 6px;
      font-size: 15px;
      color: var(--muted);
      transition: background 0.2s, color 0.2s;
    }

    .icon-btn:hover { background: var(--surface2); color: var(--text); }

    @media (max-width: 600px) {
      header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
      .search-box { width: 100%; }
      main { padding: 20px 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      <h1>Agent Inventory</h1>
      <p>AI-Native for Testers</p>
    </div>
  </div>
  <div class="header-actions">
    <input class="search-box" id="search" type="text" placeholder="Search agents…" oninput="render()" />
    <button class="btn btn-ghost" onclick="exportAgents()" title="Export all agents as JSON">↓ Export</button>
    <button class="btn btn-ghost" onclick="document.getElementById('import-input').click()" title="Import agents from JSON">↑ Import</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importAgents(event)" />
    <button class="btn btn-primary" onclick="openModal()">+ Add Agent</button>
  </div>
</header>

<main>
  <div class="stats-bar" id="stats"></div>

  <div class="filter-bar" id="filters"></div>

  <div class="grid" id="grid"></div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Add Agent</h2>
    <div class="field">
      <label>Name *</label>
      <input id="f-name" type="text" placeholder="e.g. Test Generator" />
    </div>
    <div class="field">
      <label>Icon (emoji)</label>
      <input id="f-icon" type="text" placeholder="🤖" maxlength="4" />
    </div>
    <div class="field">
      <label>Category</label>
      <select id="f-category">
        <option value="Testing">Testing</option>
        <option value="Code Quality">Code Quality</option>
        <option value="Exploration">Exploration</option>
        <option value="Documentation">Documentation</option>
        <option value="Infrastructure">Infrastructure</option>
        <option value="Security">Security</option>
        <option value="General">General</option>
      </select>
    </div>
    <div class="field">
      <label>Status</label>
      <select id="f-status">
        <option value="active">Active</option>
        <option value="experimental">Experimental</option>
        <option value="deprecated">Deprecated</option>
      </select>
    </div>
    <div class="field">
      <label>Purpose *</label>
      <textarea id="f-purpose" placeholder="What does this agent do?"></textarea>
    </div>
    <div class="field">
      <label>Tools / Capabilities</label>
      <input id="f-tools" type="text" placeholder="e.g. Read, Grep, Bash (comma separated)" />
    </div>
    <div class="field">
      <label>Trigger / When to use</label>
      <input id="f-trigger" type="text" placeholder="e.g. When you need to find files quickly" />
    </div>
    <div class="field">
      <label>Tags (comma separated)</label>
      <input id="f-tags" type="text" placeholder="e.g. testing, automation, fast" />
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Any extra context, limitations, or tips…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAgent()">Save Agent</button>
    </div>
  </div>
</div>

<script>
const COLOR_POOLS = [
  'linear-gradient(135deg,#7c6af7,#56cfb2)',
  'linear-gradient(135deg,#f7816a,#f7c56a)',
  'linear-gradient(135deg,#56cfb2,#4ab8f7)',
  'linear-gradient(135deg,#f7c56a,#f7816a)',
  'linear-gradient(135deg,#4ab8f7,#7c6af7)',
  'linear-gradient(135deg,#f76a9b,#f7816a)',
  'linear-gradient(135deg,#a0f76a,#56cfb2)',
];

const DEFAULT_AGENTS = [
  {
    id: uid(), name: 'General Purpose', icon: '🧠', category: 'General', status: 'active',
    purpose: 'Handles complex, multi-step research and coding tasks autonomously. The swiss-army knife agent for open-ended problems.',
    tools: 'All tools',
    trigger: 'When searching for a keyword or file and not confident you will find the right match in the first few tries.',
    tags: ['research', 'multi-step', 'autonomous'],
    notes: 'Best for exploratory or ambiguous tasks where you need broad tool access.'
  },
  {
    id: uid(), name: 'Explore', icon: '🔍', category: 'Exploration', status: 'active',
    purpose: 'Fast codebase exploration. Finds files by glob patterns, searches code for keywords, and answers structural questions about the codebase.',
    tools: 'Glob, Grep, Read, Bash (no Edit/Write)',
    trigger: 'Quickly find files by pattern (e.g. src/**/*.tsx) or search code for keywords.',
    tags: ['fast', 'exploration', 'read-only'],
    notes: 'Specify thoroughness: quick / medium / very thorough. Read-only — safe to run freely.'
  },
  {
    id: uid(), name: 'Plan', icon: '📐', category: 'Code Quality', status: 'active',
    purpose: 'Software architect agent. Designs implementation plans, identifies critical files, and considers architectural trade-offs before any code is written.',
    tools: 'All tools except Edit, Write, NotebookEdit',
    trigger: 'When you need to plan an implementation strategy for a non-trivial task.',
    tags: ['architecture', 'planning', 'design'],
    notes: 'Returns step-by-step plans. Run before writing code to align on approach.'
  },
  {
    id: uid(), name: 'Claude Code Guide', icon: '📖', category: 'Documentation', status: 'active',
    purpose: 'Answers questions about Claude Code CLI features, hooks, slash commands, MCP servers, settings, IDE integrations, keyboard shortcuts, Agent SDK, and the Claude API.',
    tools: 'Glob, Grep, Read, WebFetch, WebSearch',
    trigger: 'When the user asks "Can Claude…", "Does Claude…", "How do I…" about Claude Code or the Anthropic API.',
    tags: ['documentation', 'help', 'api'],
    notes: 'Do not spawn if a recent claude-code-guide agent is already running — continue via SendMessage instead.'
  },
  {
    id: uid(), name: 'Test Generator', icon: '🧪', category: 'Testing', status: 'experimental',
    purpose: 'Generates test cases (unit, integration, exploratory charters) from source code or specifications. Covers happy paths, edge cases, and failure modes.',
    tools: 'Read, Grep, Glob, Write',
    trigger: 'When you have new or changed code and need test coverage quickly.',
    tags: ['test-generation', 'coverage', 'automation'],
    notes: 'Review generated tests for correctness — LLM may miss domain-specific invariants.'
  },
  {
    id: uid(), name: 'Bug Finder', icon: '🐛', category: 'Testing', status: 'experimental',
    purpose: 'Performs static analysis-style review to surface potential bugs, null-pointer risks, off-by-one errors, unhandled exceptions, and logic flaws.',
    tools: 'Read, Grep, Glob',
    trigger: 'Before code review or after a production incident — ask "what could go wrong here?"',
    tags: ['bugs', 'static-analysis', 'review'],
    notes: 'Works best on focused, bounded scopes (single module). Broad scans can produce noise.'
  },
  {
    id: uid(), name: 'Exploratory Test Charter Agent', icon: '🗺️', category: 'Testing', status: 'experimental',
    purpose: 'Creates structured exploratory testing charters from a feature description or user story. Identifies risk areas, suggests personas, and defines mission/timeboxes.',
    tools: 'Read, WebSearch',
    trigger: 'When preparing an exploratory testing session for a new feature or unfamiliar area.',
    tags: ['exploratory', 'charters', 'testing'],
    notes: 'Output charters in SBTM or ET square format. Pair with a human tester for execution.'
  },
  {
    id: uid(), name: 'Security Reviewer', icon: '🔒', category: 'Security', status: 'experimental',
    purpose: 'Reviews code for OWASP Top 10 vulnerabilities, injection risks, auth/authz flaws, secrets in code, and insecure defaults.',
    tools: 'Read, Grep, Glob',
    trigger: 'Before merging user-facing features or any code that handles credentials, tokens, or user input.',
    tags: ['security', 'owasp', 'review'],
    notes: 'For authorized security testing only. Always have a human verify findings before acting.'
  },
  {
    id: uid(), name: 'Statusline Setup', icon: '⚙️', category: 'Infrastructure', status: 'active',
    purpose: 'Configures the Claude Code status line setting in the user\'s environment.',
    tools: 'Read, Edit',
    trigger: 'When the user wants to configure or troubleshoot the Claude Code terminal status line.',
    tags: ['config', 'setup', 'cli'],
    notes: 'Narrow-scope agent — only touches statusline configuration.'
  },
  {
    id: uid(), name: 'Regression Risk Analyzer', icon: '📉', category: 'Testing', status: 'experimental',
    purpose: 'Analyzes a diff or list of changed files and identifies which existing tests are most likely to fail and which areas lack test coverage for the change.',
    tools: 'Read, Grep, Glob, Bash',
    trigger: 'After a large refactor or before a release — "what might break?"',
    tags: ['regression', 'risk', 'coverage-gap'],
    notes: 'Pairs well with the Explore agent to map change scope before analysis.'
  },
];

let agents = loadAgents();
let editId = null;
let activeFilter = 'All';

function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

function loadAgents() {
  try {
    const raw = localStorage.getItem('agent-inventory');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return DEFAULT_AGENTS.map(a => ({...a, id: a.id || uid()}));
}

function save() { localStorage.setItem('agent-inventory', JSON.stringify(agents)); }

function categories() {
  const all = agents.map(a => a.category);
  return ['All', ...new Set(all)];
}

function statusBadge(s) {
  const map = { active: 'Active', experimental: 'Experimental', deprecated: 'Deprecated' };
  const cls = { active: 'status-active', experimental: 'status-experimental', deprecated: 'status-deprecated' };
  return `<span class="status-badge ${cls[s]||'status-active'}"><span class="dot"></span>${map[s]||s}</span>`;
}

function colorFor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  return COLOR_POOLS[h % COLOR_POOLS.length];
}

function renderStats() {
  const total = agents.length;
  const active = agents.filter(a => a.status === 'active').length;
  const exp = agents.filter(a => a.status === 'experimental').length;
  const cats = new Set(agents.map(a => a.category)).size;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Total Agents</div></div>
    <div class="stat"><div class="stat-value">${active}</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-value">${exp}</div><div class="stat-label">Experimental</div></div>
    <div class="stat"><div class="stat-value">${cats}</div><div class="stat-label">Categories</div></div>
  `;
}

function renderFilters() {
  document.getElementById('filters').innerHTML = categories()
    .map(c => `<button class="filter-chip ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`)
    .join('');
}

function setFilter(c) { activeFilter = c; render(); }

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return agents.filter(a => {
    const matchCat = activeFilter === 'All' || a.category === activeFilter;
    const matchQ = !q || [a.name, a.purpose, a.category, ...(a.tags||[])].some(v => v.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
}

function render() {
  renderStats();
  renderFilters();
  const list = filtered();
  const grid = document.getElementById('grid');

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔎</div><p>No agents match your search.</p></div>`;
    return;
  }

  grid.innerHTML = list.map(a => `
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:${colorFor(a.name)}">${a.icon || '🤖'}</div>
        <div class="card-title-block">
          <div class="card-name">${esc(a.name)}</div>
          <div class="card-category">${esc(a.category)}</div>
        </div>
        <div class="card-actions">
          <button class="icon-btn" title="Edit" onclick="openModal('${a.id}')">✏️</button>
          <button class="icon-btn" title="Delete" onclick="deleteAgent('${a.id}')">🗑️</button>
        </div>
      </div>
      ${statusBadge(a.status)}
      <div class="card-desc">${esc(a.purpose)}</div>
      <div class="card-meta">
        ${a.tools ? `<div class="meta-row"><span class="meta-key">Tools</span><span class="meta-val">${esc(a.tools)}</span></div>` : ''}
        ${a.trigger ? `<div class="meta-row"><span class="meta-key">Trigger</span><span class="meta-val">${esc(a.trigger)}</span></div>` : ''}
        ${a.notes ? `<div class="meta-row"><span class="meta-key">Notes</span><span class="meta-val">${esc(a.notes)}</span></div>` : ''}
      </div>
      ${a.tags && a.tags.length ? `<div class="tags">${a.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal(id) {
  editId = id || null;
  const a = id ? agents.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent = a ? 'Edit Agent' : 'Add Agent';
  document.getElementById('f-name').value = a?.name || '';
  document.getElementById('f-icon').value = a?.icon || '';
  document.getElementById('f-category').value = a?.category || 'Testing';
  document.getElementById('f-status').value = a?.status || 'active';
  document.getElementById('f-purpose').value = a?.purpose || '';
  document.getElementById('f-tools').value = a?.tools || '';
  document.getElementById('f-trigger').value = a?.trigger || '';
  document.getElementById('f-tags').value = (a?.tags || []).join(', ');
  document.getElementById('f-notes').value = a?.notes || '';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f-name').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}

function saveAgent() {
  const name = document.getElementById('f-name').value.trim();
  const purpose = document.getElementById('f-purpose').value.trim();
  if (!name || !purpose) { alert('Name and Purpose are required.'); return; }

  const obj = {
    id: editId || uid(),
    name,
    icon: document.getElementById('f-icon').value.trim() || '🤖',
    category: document.getElementById('f-category').value,
    status: document.getElementById('f-status').value,
    purpose,
    tools: document.getElementById('f-tools').value.trim(),
    trigger: document.getElementById('f-trigger').value.trim(),
    tags: document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    notes: document.getElementById('f-notes').value.trim(),
  };

  if (editId) {
    const idx = agents.findIndex(a => a.id === editId);
    if (idx > -1) agents[idx] = obj;
  } else {
    agents.push(obj);
  }

  save();
  closeModal();
  render();
}

function deleteAgent(id) {
  const a = agents.find(x => x.id === id);
  if (!confirm(`Delete "${a?.name}"?`)) return;
  agents = agents.filter(x => x.id !== id);
  save();
  render();
}

function exportAgents() {
  const json = JSON.stringify(agents, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `agent-inventory-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importAgents(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      if (!Array.isArray(data)) throw new Error('Expected a JSON array.');
      const valid = data.filter(a => a.name && a.purpose);
      if (!valid.length) throw new Error('No valid agents found (each needs name + purpose).');

      const merged = confirm(
        `Found ${valid.length} agent(s).\n\nMerge with existing (OK) or Replace all (Cancel)?`
      );

      if (merged) {
        // merge: add new, update existing by name
        valid.forEach(incoming => {
          incoming.id = incoming.id || uid();
          const idx = agents.findIndex(a => a.name === incoming.name);
          if (idx > -1) agents[idx] = incoming;
          else agents.push(incoming);
        });
      } else {
        agents = valid.map(a => ({ ...a, id: a.id || uid() }));
      }

      save();
      render();
      alert(`Import complete — ${valid.length} agent(s) loaded.`);
    } catch (err) {
      alert('Import failed: ' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// Close modal on overlay click
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

// Keyboard shortcut: N = new agent
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'n' && !e.metaKey && !e.ctrlKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') openModal();
});

render();
</script>
</body>
